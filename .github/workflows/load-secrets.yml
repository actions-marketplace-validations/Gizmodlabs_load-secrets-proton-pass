name: Load Secrets (Proton Pass)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  load-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Load secrets into .env
        uses: ./
        with:
          personal-access-token: ${{ secrets.PROTON_PASS_PERSONAL_ACCESS_TOKEN }}
        env:
          SECRET_ONE: "pass://GithubActions/load-secrets-proton-pass-test/Email"

      - name: Print resolved values
        run: |
          echo "SECRET_ONE=$SECRET_ONE"
          echo "---"
          echo "All env vars set by the action:"
          env | grep -E '^SECRET_' | sort
