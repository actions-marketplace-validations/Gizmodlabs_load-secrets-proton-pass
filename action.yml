name: 'Load Secrets from Proton Pass'
description: 'Load secrets from Proton Pass vaults into GitHub Actions workflows using pass:// URIs'
author: 'Gizmodlabs LLC'

branding:
  icon: 'lock'
  color: 'purple'

inputs:
  personal-access-token:
    description: 'Proton Pass Personal Access Token in the format `pst_xxxx::TOKENKEY`. Generate with `pass-cli pat create`.'
    required: true
  env-template:
    description: 'Path to .env template file with pass:// references to inject'
    required: false
    default: ''
  pass-cli-version:
    description: 'Proton Pass CLI version to install (pinned default for reproducibility — override to `latest` or another version if needed)'
    required: false
    default: '2.1.0'
  mask-values:
    description: 'Mask resolved secret values in logs'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Install Proton Pass CLI
      id: install
      shell: bash
      run: ${{ github.action_path }}/scripts/install-cli.sh
      env:
        PASS_CLI_VERSION: ${{ inputs.pass-cli-version }}

    - name: Authenticate
      shell: bash
      run: |
        if [[ -z "$PROTON_PASS_PERSONAL_ACCESS_TOKEN" ]]; then
          echo "::error::personal-access-token input is required"
          exit 1
        fi

        pass-cli login

        pass-cli info || {
          echo "::error::Proton Pass authentication failed. Check that the PAT is valid and has vault access."
          exit 1
        }
        echo "Authenticated with Proton Pass"
      env:
        PROTON_PASS_KEY_PROVIDER: fs
        PROTON_PASS_PERSONAL_ACCESS_TOKEN: ${{ inputs.personal-access-token }}

    - name: Resolve Secrets
      id: secrets
      shell: bash
      run: ${{ github.action_path }}/scripts/resolve-secrets.sh
      env:
        PROTON_PASS_KEY_PROVIDER: fs
        MASK_VALUES: ${{ inputs.mask-values }}

    - name: Inject Template
      if: inputs.env-template != ''
      shell: bash
      run: ${{ github.action_path }}/scripts/inject-template.sh
      env:
        PROTON_PASS_KEY_PROVIDER: fs
        ENV_TEMPLATE: ${{ inputs.env-template }}
        MASK_VALUES: ${{ inputs.mask-values }}

    - name: Cleanup
      if: always()
      shell: bash
      run: ${{ github.action_path }}/scripts/cleanup.sh
