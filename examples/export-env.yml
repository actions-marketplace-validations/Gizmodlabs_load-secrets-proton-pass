# Export secrets as environment variables for all subsequent steps
name: Deploy with Exported Env Vars

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load secrets
        uses: gizmodlabs/load-secrets-proton-pass@v1
        with:
          account-email: ${{ secrets.PROTON_ACCOUNT_EMAIL }}
          proton-password: ${{ secrets.PROTON_PASS_PASSWORD }}
          export-env: true
        env:
          DATABASE_URL: "pass://Production/Database/connection_string"
          REDIS_URL: "pass://Production/Redis/url"

      # DATABASE_URL and REDIS_URL are now available in all subsequent steps
      - name: Run migrations
        run: ./migrate.sh

      - name: Deploy
        run: ./deploy.sh
