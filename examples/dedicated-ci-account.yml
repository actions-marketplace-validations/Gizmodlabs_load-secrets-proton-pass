# Recommended setup: use a dedicated Proton account for CI/CD
#
# Why:
#   - No 2FA/TOTP complexity (TOTP codes expire every 30s, tricky in CI)
#   - Principle of least privilege: share only the vaults this account needs
#   - Easy to revoke access by removing vault sharing
#
# Setup steps:
#   1. Create a new Proton account (e.g., ci@yourcompany.com)
#   2. Subscribe to Proton Pass Plus+ (required for CLI access)
#   3. Do NOT enable 2FA on this account
#   4. From your main account, share the necessary vault(s) with ci@yourcompany.com
#   5. Add these GitHub repo secrets:
#      - PROTON_ACCOUNT_EMAIL = ci@yourcompany.com
#      - PROTON_PASS_PASSWORD = <the CI account's password>

name: Deploy (Dedicated CI Account)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load secrets
        id: secrets
        uses: gizmodlabs/load-secrets-proton-pass@v1
        with:
          account-email: ${{ secrets.PROTON_ACCOUNT_EMAIL }}
          proton-password: ${{ secrets.PROTON_PASS_PASSWORD }}
          export-env: true
        env:
          DATABASE_URL: "pass://Shared-CI/Database/connection_string"
          API_KEY: "pass://Shared-CI/API/key"

      - name: Deploy
        run: ./deploy.sh
