# Basic usage: load secrets as environment variables
name: Deploy with Proton Pass Secrets

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load secrets
        uses: gizmodlabs/load-secrets-proton-pass@v1
        with:
          personal-access-token: ${{ secrets.PROTON_PASS_PERSONAL_ACCESS_TOKEN }}
        env:
          DB_PASSWORD: "pass://Production/Database/password"
          API_KEY: "pass://Production/API/key"

      # DB_PASSWORD and API_KEY are now exported as env vars
      - name: Use secrets
        run: ./deploy.sh
