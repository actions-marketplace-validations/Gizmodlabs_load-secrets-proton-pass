# Using 2FA/TOTP with the action
#
# If your Proton account has 2FA enabled, you need to generate a TOTP code
# at runtime from the TOTP seed (the base32 secret from initial 2FA setup).
#
# Store the TOTP seed as a GitHub secret: PROTON_TOTP_SEED
#
# Note: A dedicated CI account without 2FA is recommended instead (see
# dedicated-ci-account.yml). Only use this approach if 2FA is required.

name: Deploy with TOTP

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate TOTP code
        id: totp
        run: |
          sudo apt-get install -y -qq oathtool
          CODE=$(oathtool --totp -b "${{ secrets.PROTON_TOTP_SEED }}")
          echo "code=$CODE" >> $GITHUB_OUTPUT

      - name: Load secrets
        id: secrets
        uses: gizmodlabs/load-secrets-proton-pass@v1
        with:
          account-email: ${{ secrets.PROTON_ACCOUNT_EMAIL }}
          proton-password: ${{ secrets.PROTON_PASS_PASSWORD }}
          totp: ${{ steps.totp.outputs.code }}
          export-env: true
        env:
          DATABASE_URL: "pass://Production/Database/connection_string"

      - name: Deploy
        run: ./deploy.sh
